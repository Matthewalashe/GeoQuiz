    <!-- Prerendered content for SEO crawlers — replaced by React on mount -->
    <div id="root">

    <script>
      // ═══ DOM SAFETY PATCH ═══
      // Prevents React crash: "Failed to execute 'removeChild' on 'Node'"
      // Caused by Google Identity Services (or any third-party script) injecting
      // iframes/elements into React-managed DOM nodes. When React re-renders,
      // it tries to remove nodes that GIS already moved — this patch handles that.
      // This is a standard production fix used by Next.js, Gatsby, etc.
      (function() {
        if (typeof Node === 'undefined') return;
        var _removeChild = Node.prototype.removeChild;
        Node.prototype.removeChild = function(child) {
          if (child.parentNode !== this) {
            return child; // Node was already moved by third-party script
          }
          return _removeChild.apply(this, arguments);
        };
        var _insertBefore = Node.prototype.insertBefore;
        Node.prototype.insertBefore = function(newNode, refNode) {
          if (refNode && refNode.parentNode !== this) {
            return newNode; // Reference node was moved by third-party script
          }
          return _insertBefore.apply(this, arguments);
        };
      })();

      // Global error handler — LOG but do NOT swallow errors
      window.onerror = function(msg, url, line, col, err) {
        console.error('[Global Error]', msg, url, line, col, err);
        // return false = let browser show the error normally in console
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        console.error('[Unhandled Promise]', e.reason);
        // Do NOT call e.preventDefault() — let the error appear in console
      });

      // Safety net: if React fails to mount within 6 seconds, show recovery UI
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
          root.innerHTML = '<div style="padding:2rem;text-align:center;font-family:Inter,sans-serif;color:#fff;background:#1a1a2e;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center">'
            + '<h2 style="color:#C8963E;margin-bottom:1rem">App failed to load</h2>'
            + '<p style="color:#aaa;margin-bottom:1.5rem;max-width:350px">Something went wrong during startup. Clear data and reload to fix.</p>'
            + '<button onclick="try{localStorage.clear();sessionStorage.clear()}catch(e){};if(window.caches){caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})})};if(navigator.serviceWorker){navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(s){s.unregister()})})};setTimeout(function(){location.reload()},400)" style="padding:12px 32px;border-radius:25px;background:#C8963E;color:#fff;border:none;font-size:16px;cursor:pointer">Clear &amp; Reload</button>'
            + '</div>';
        }
      }, 6000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // ═══ SEAMLESS AUTO-UPDATE ═══
      // On every page load: fetch version.json from server (bypasses ALL caches).
      // If version changed → unregister SWs → clear caches → reload.
      // Users never need to do anything.
      (function() {
        // Step 1: Version check
        fetch('/version.json?_=' + Date.now(), { cache: 'no-store' })
          .then(function(r) { return r.json(); })
          .then(function(server) {
            var local = localStorage.getItem('wanda_app_ver');
            if (local && local !== server.version) {
              console.log('[Update] ' + local + ' → ' + server.version);
              if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(regs) {
                  regs.forEach(function(r) { r.unregister(); });
                });
              }
              if (window.caches) {
                caches.keys().then(function(keys) {
                  keys.forEach(function(k) { caches.delete(k); });
                });
              }
              localStorage.setItem('wanda_app_ver', server.version);
              setTimeout(function() { window.location.reload(); }, 300);
            } else {
              localStorage.setItem('wanda_app_ver', server.version);
            }
          })
          .catch(function() {});

        // Step 2: Register/update service worker
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js').then(function(reg) {
              if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
              reg.addEventListener('updatefound', function() {
                var sw = reg.installing;
                if (sw) sw.addEventListener('statechange', function() {
                  if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                    sw.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
            }).catch(function() {});
          });
        }
      })();
    </script>
